# WireGuard portal — TLS + HTTP basic auth in front of the localhost app.
# PROXY_TOKEN_PLACEHOLDER is replaced with a random secret at install time; the
# app rejects any request that doesn't carry it, so the app can't be reached
# except through this nginx vhost even though it listens on 127.0.0.1.

limit_req_zone $binary_remote_addr zone=wgportal:10m rate=120r/m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/ssl/wg-portal/portal.crt;
    ssl_certificate_key /etc/ssl/wg-portal/portal.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    auth_basic           "WireGuard Portal";
    auth_basic_user_file /etc/wg-portal/htpasswd;

    client_max_body_size 16k;

    location / {
        limit_req zone=wgportal burst=40 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Portal-Token    "PROXY_TOKEN_PLACEHOLDER";
        proxy_read_timeout 30s;
    }
}
