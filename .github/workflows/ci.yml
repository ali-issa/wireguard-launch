name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tool versions
        run: |
          bash --version | head -1
          python3 --version
          shellcheck --version | sed -n '1,2p' || echo "shellcheck: n/a"

      - name: Run test suite
        run: ./tests/run.sh

  opentofu:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opentofu
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
      - name: Format check
        run: tofu fmt -check -recursive
      - name: Validate
        run: |
          tofu init -backend=false -input=false
          tofu validate
