name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tool versions
        run: |
          bash --version | head -1
          python3 --version
          shellcheck --version | sed -n '1,2p' || echo "shellcheck: n/a"

      - name: Run test suite
        run: ./tests/run.sh
